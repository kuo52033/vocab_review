services:
  api:
    image: ${BACKEND_IMAGE}
    env_file:
      - .env.production
    environment:
      ADDR: ":8080"
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  migrate:
    image: ${BACKEND_IMAGE}
    env_file:
      - .env.production
    command: ["/app/goose", "-dir", "/app/migrations", "postgres", "${DATABASE_URL}", "up"]

volumes:
  caddy_data:
  caddy_config:
