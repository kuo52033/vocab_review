name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker image tag to push to ECR"
        required: false
        type: string

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vocab -d vocab_review_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://vocab:vocab@127.0.0.1:5432/vocab_review_test?sslmode=disable

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go unit tests
        working-directory: backend
        run: go test ./...

      - name: Run database migrations
        run: go run github.com/pressly/goose/v3/cmd/goose@v3.24.3 -dir backend/migrations postgres "$DATABASE_URL" up

      - name: Run Postgres integration tests
        working-directory: backend
        run: go test ./internal/repository/postgres -count=1

  frontend:
    name: Web and Extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Build Chrome extension
        run: npm run build:extension

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ap-northeast-1
      AWS_ACCOUNT_ID: "293133628661"
      AWS_ECR_REPOSITORY: vocab-review
      AWS_ROLE_TO_ASSUME: arn:aws:iam::293133628661:role/vocab-review-github-actions

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        shell: bash
        env:
          INPUT_DOCKER_TAG: ${{ github.event.inputs.docker_tag }}
        run: |
          if [ -n "$INPUT_DOCKER_TAG" ]; then
            tag="$INPUT_DOCKER_TAG"
          else
            tag="master-${GITHUB_SHA::12}"
          fi
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=$registry/$AWS_ECR_REPOSITORY:$tag" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t "${{ steps.image.outputs.image }}" .

      - name: Push Docker image
        run: docker push "${{ steps.image.outputs.image }}"

      - name: Print image
        run: echo "Pushed ${{ steps.image.outputs.image }}"
