name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write

env:
  # Required GitHub configuration:
  # - Secret: AWS_ROLE_TO_ASSUME = IAM role ARN trusted by GitHub Actions OIDC.
  # - Variable: AWS_REGION = AWS region for ECR, SSM, and the EC2 instance.
  # - Variable: AWS_ACCOUNT_ID = AWS account that owns ECR and the EC2 instance.
  # - Variable: ECR_REPOSITORY = ECR repository name for the backend image.
  # - Variable: EC2_INSTANCE_ID = target EC2 instance managed by AWS SSM.
  # - Variable: DEPLOY_DIR = target directory on EC2, usually /opt/vocab-review.
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/vocab-review' }}

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vocab
          POSTGRES_PASSWORD: vocab
          POSTGRES_DB: vocab_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vocab -d vocab_review_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go unit tests
        working-directory: backend
        run: go test ./...

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://vocab:vocab@127.0.0.1:5432/vocab_review_test?sslmode=disable
        run: go run github.com/pressly/goose/v3/cmd/goose@v3.24.3 -dir backend/migrations postgres "$DATABASE_URL" up

      - name: Run Postgres integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://vocab:vocab@127.0.0.1:5432/vocab_review_test?sslmode=disable
        run: go test ./internal/repository/postgres -count=1

  frontend:
    name: Web and Extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Build Chrome extension
        run: npm run build:extension

  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - backend
      - frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AWS_REGION
            AWS_ACCOUNT_ID
            ECR_REPOSITORY
            EC2_INSTANCE_ID
            DEPLOY_DIR
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required. Configure it as a GitHub Actions repository variable."
              exit 1
            fi
          done
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME is required. Configure it as a GitHub Actions secret."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          tag="master-${GITHUB_SHA::12}"
          image="$registry/$ECR_REPOSITORY:$tag"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Build backend Docker image
        run: docker build -f backend/Dockerfile -t "${{ steps.image.outputs.image }}" .

      - name: Push backend Docker image
        run: docker push "${{ steps.image.outputs.image }}"

      - name: Package deploy directory
        shell: bash
        run: |
          set -euo pipefail
          tar -czf deploy.tgz deploy
          base64 -w 0 deploy.tgz > deploy.tgz.b64

      - name: Deploy through AWS SSM
        shell: bash
        env:
          BACKEND_IMAGE: ${{ steps.image.outputs.image }}
          ECR_REGISTRY: ${{ steps.image.outputs.registry }}
        run: |
          set -euo pipefail

          deploy_tarball_b64="$(cat deploy.tgz.b64)"

          jq -n \
            --arg deploy_dir "$DEPLOY_DIR" \
            --arg deploy_tarball_b64 "$deploy_tarball_b64" \
            --arg backend_image "$BACKEND_IMAGE" \
            --arg aws_region "$AWS_REGION" \
            --arg ecr_registry "$ECR_REGISTRY" \
            '{
              commands: [
                "set -euo pipefail",
                "DEPLOY_DIR=" + ($deploy_dir | @sh),
                "BACKEND_IMAGE=" + ($backend_image | @sh),
                "AWS_REGION=" + ($aws_region | @sh),
                "ECR_REGISTRY=" + ($ecr_registry | @sh),
                "sudo mkdir -p \"$DEPLOY_DIR\"",
                "tmpdir=$(mktemp -d)",
                "trap '\''rm -rf \"$tmpdir\"'\'' EXIT",
                "cat > \"$tmpdir/deploy.tgz.b64\" <<'\''DEPLOY_TARBALL_B64'\''\n" + $deploy_tarball_b64 + "\nDEPLOY_TARBALL_B64",
                "base64 -d \"$tmpdir/deploy.tgz.b64\" > \"$tmpdir/deploy.tgz\"",
                "sudo tar -xzf \"$tmpdir/deploy.tgz\" -C \"$DEPLOY_DIR\" --strip-components=1",
                "cd \"$DEPLOY_DIR\"",
                "if [ ! -f .env.production ]; then echo \"Missing $DEPLOY_DIR/.env.production\" >&2; exit 1; fi",
                "if grep -q \"^BACKEND_IMAGE=\" .env.production; then sudo sed -i.bak \"s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=$BACKEND_IMAGE|\" .env.production; else printf \"\\nBACKEND_IMAGE=%s\\n\" \"$BACKEND_IMAGE\" | sudo tee -a .env.production >/dev/null; fi",
                "aws ecr get-login-password --region \"$AWS_REGION\" | docker login --username AWS --password-stdin \"$ECR_REGISTRY\"",
                "docker compose --env-file .env.production -f docker-compose.prod.yml pull",
                "docker compose --env-file .env.production -f docker-compose.prod.yml run --rm migrate",
                "docker compose --env-file .env.production -f docker-compose.prod.yml up -d"
              ]
            }' > ssm-parameters.json

          command_id="$(
            aws ssm send-command \
              --document-name AWS-RunShellScript \
              --instance-ids "$EC2_INSTANCE_ID" \
              --comment "Deploy Vocab Review ${{ steps.image.outputs.tag }}" \
              --parameters file://ssm-parameters.json \
              --query "Command.CommandId" \
              --output text
          )"

          echo "SSM command: $command_id"
          if ! aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"; then
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
              --output json
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json
